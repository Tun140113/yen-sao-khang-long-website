server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy Base44 auth endpoints so OAuth callbacks like `/api/apps/auth/final-callback`
  # work under your self-hosted domain.
  location /api/ {
    proxy_pass https://base44.app/api/;
    proxy_set_header Host base44.app;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
  }

  # Optional: Base44 websocket (realtime) support
  location /ws-user-apps/socket.io/ {
    proxy_pass https://base44.app/ws-user-apps/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host base44.app;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
